name: Workflow pour les jeux vidéo
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
   
    steps:
    - name: Run checkout code 
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
    
    - name: Install dependecies
      run: npm install
    
    - name: Lint code 
      run: npx eslint


    - name: Run test unitaires
      run: npm run test -- --reporter=github-actions 
    - name: Créer un résumé de test
      run: echo "### 🧪 Exécution des tests en cours..." >> $GITHUB_STEP_SUMMARY
      
      # reporter permet de faire le resumé des tests dans le workflow
      #installation des navigateurs playrwright (important)
    
    - name: install playwright browsers
      run: npx playwright install --with-deps
   
    - name: run test Fonctionelle
      run: npx playwright test e2e/
    
