name: Workflow pour les jeux vidéo
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
   
    steps:
    - name: Run checkout code 
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
    
    - name: Install dependecies
      run: npm install
    
    - name: Lint code 
      run: npx eslint

  
    
